<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us</title>
    <meta name="description" content="This page provides contact information on how to reach us.">
    <meta name="author" content="Lady Sheynn Vengco">
    <link rel="stylesheet" href="styles/rafting.css">
</head>

<body>
    <header>
        <img src="images/z-wwr-oars.png" alt="WWR logo" width="120">
        <nav>
            <a href="index.html">Home</a>
            <a href="about.html">About Us</a>
            <a href="trips.html">Trips</a>
            <a href="contact.html">Contact Us</a>
        </nav>
    </header>
    <main>
        <div class="contact-detail">
            <h1>White Water Rafting Company</h1>
            <p>123 Main River Street</p>
            <p>Kolob, California</p>
            <p>+1 999 999 9999</p>
            <p>info@whitewater.com</p>
        </div>
        <div class="grid-group">
            <div class="map-container">
                <iframe
                  src="https://www.google.com/maps/embed?pb=!1m14!1m12!1m3!1d17825.902135950728!2d-119.99902334130138!3d37.832108174050155!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!5e0!3m2!1sen!2sph!4v1775404558945!5m2!1sen!2sph"
                  allowfullscreen="" loading="lazy"
                  referrerpolicy="no-referrer-when-downgrade"></iframe>
            </div>
            <div class="form-group">
                <form>
                    <div class="client-detail">
                        <label for="name">Name</label>
                        <input type="text" id="name" name="name" placeholder="Name here">
                    </div>
                    <div class="client-detail">
                        <label for="email">Email</label>
                        <input type="email" id="email" name="email" placeholder="Email here">
                    </div>
                    <div class="client-detail">
                        <label>Message Purpose</label>
                        <div class="radio-buttons">
                            <div class="radio-list">
                                <input type="radio" name="purpose" id="inquiry"
                                  value="General Inquiry">
                                <label for="inquiry">General Inquiry</label>
                            </div>
                            <div class="radio-list">
                                <input type="radio" name="purpose" id="questions"
                                  value="Reservation Questions">
                                <label for="questions">Reservation Questions</label>
                            </div>
                            <div class="radio-list">
                                <input type="radio" name="purpose" id="suggestions"
                                  value="Website Suggestion">
                                <label for="suggestions">Website Suggestion</label>
                            </div>
                        </div>
                    </div>
                    <label for="message">Message</label>
                    <textarea name="message" id="message" rows="5"
                      placeholder="Type here"></textarea>

                    <div class="checkbox-item">
                        <input type="checkbox" id="subscribe" name="subscribe">
                        <label for="subscribe">Please subscribe me to the monthly newsletter</label>
                    </div>
                    <button type="submit">Get in Touch!</button>
                </form>
            </div>
        </div>
        <section class="employees">
            <h2>We Are Here to Serve You</h2>
            <div class="emp-profiles">
                <figure>
                    <img src="images/jason_pic.jpg" alt="CEO Jason">
                    <figcaption>CEO & Manager Edgar</figcaption>
                </figure>
                <figure>
                    <img src="images/jasmin_pic.jpg" alt="Coordinator Jasmin">
                    <figcaption>Coordinator Jasmin</figcaption>
                </figure>
                <figure>
                    <img src="images/edgars_pic.jpg" alt="Field Officer Edgar">
                    <figcaption>Field Officer Jason</figcaption>
                </figure>
            </div>
        </section>
    </main>
    <footer>
        <p>© 2026 White Water Rafting | Lady Sheynn Vengco</p>
        <nav class="socialmedia">
            <a href="https://facebook.com"><img src="images/facebook.svg" alt="Facebook"
                  width="30"></a>
            <a href="https://www.instagram.com/?hl=en"><img src="images/instagram.svg"
                  alt="Instagram" width="30"></a>
            <a href="https://youtube.com"><img src="images/youtube-square.svg" alt="YouTube"
                  width="30"></a>
        </nav>
    </footer>
</body>

</html>
