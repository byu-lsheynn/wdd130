<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Basic HTML and CSS Quiz</title>
    <link rel="stylesheet" href="styles/quiz.css">
</head>

<body>
    <main>
        <h1>✅ Basic HTML and CSS Quiz</h1>
        <form>
            <div class="quiz-item">
                <label for="q1">1. What specific HTML element used to define the most important
                    heading on a page?</label>
                <input type="text" name="q1" id="q1">
            </div>
            <div class="quiz-item">
                <label for="q2">2. Explain the purpose of the <code class="insert">alt</code>
                    attribute within an
                    <code>&lt;img&gt;</code> tag.</label>
                <textarea name="q2" id="q2"></textarea>
            </div>
            <div class="quiz-item">
                <label for="q3">3. Which property is used to change the font of an element?</label>
                <select name="q3" id="q3">
                    <option value="" selected disabled>Choose One...</option>
                    <option value="a">font-family</option>
                    <option value="b">test-style</option>
                    <option value="c">font-weight</option>
                </select>
            </div>
            <div class="quiz-item">
                <label for="q4">4. What is the top margin given this declaration?</label>
                <code class="sample">margin: 5px auto 10px;</code>
                <input type="number" name="q4" id="q4">
            </div>
            <div>
                <button type="submit">Submit Quiz</button>
            </div>
        </form>
    </main>
</body>

</html>
